name: CI/CD Pipeline - BDS Business

on:
  push:
    branches: [ main ]

jobs:
  # ================================
  # JOB 1 : Tests de securite
  # ================================
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image pour tests
        run: docker build -t bdsbusiness-test .

      - name: Scan securite avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bdsbusiness-test
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ================================
  # JOB 2 : Build et Push
  # ================================
  build:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build et Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ftd6299/bdsbusiness:latest
            ftd6299/bdsbusiness:${{ github.sha }}
