<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Déconnexion - BDS BUSINESS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            text-align: center;
        }
        .logout-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #0056b3;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            color: #212529;
            margin-bottom: 1rem;
        }
        p {
            color: #6c757d;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <div class="spinner"></div>
        <h2>Déconnexion en cours...</h2>
        <p>Veuillez patienter pendant que nous vous déconnectons.</p>
    </div>

    <script>
        // Fonction pour effacer les données de session
        function clearSession() {
            localStorage.removeItem('bds_token');
            localStorage.removeItem('bds_user');
        }

        // Attendre que le DOM soit chargé
        document.addEventListener('DOMContentLoaded', () => {
            // Délai pour l'animation
            setTimeout(() => {
                clearSession();
                // Rediriger vers la page d'accueil après la déconnexion
                window.location.href = 'index.html';
            }, 1500);
        });
    </script>
</body>
</html>
