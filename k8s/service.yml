apiVersion: v1
kind: Service
metadata:
  name: bdsbusiness-service
  namespace: default
spec:
  selector:
    app: bdsbusiness
  ports:
  - port: 80
    targetPort: 3000
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: default
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP