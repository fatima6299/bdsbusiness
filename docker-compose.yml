version: '3.9'

services:

  # ================================
  # Base de données MySQL
  # ================================
  db:
    image: mysql:8.0
    container_name: bds_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-bds}
      MYSQL_USER: ${DB_USER:-bdsuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bdspassword}
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - bds_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ================================
  # Initialisation de la base (run once)
  # ================================
  db-init:
    build: .
    container_name: bds_db_init
    restart: "no"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-bdsuser}
      DB_PASSWORD: ${DB_PASSWORD:-bdspassword}
      DB_NAME: ${DB_NAME:-bds}
      JWT_SECRET: ${JWT_SECRET:-changeme_super_secret_jwt_key}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bds_network
    command: ["node", "config/init_db.js"]

  # ================================
  # Backend Node.js / Express
  # ================================
  backend:
    build: .
    container_name: bds_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_USER: ${DB_USER:-bdsuser}
      DB_PASSWORD: ${DB_PASSWORD:-bdspassword}
      DB_NAME: ${DB_NAME:-bds}
      JWT_SECRET: ${JWT_SECRET:-changeme_super_secret_jwt_key}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - bds_network

# ================================
# Volumes persistants
# ================================
volumes:
  mysql_data:
    driver: local

# ================================
# Réseau interne
# ================================
networks:
  bds_network:
    driver: bridge